<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Readme AI</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; width: 300px; margin: 0; }
    h2 { margin-top: 0; }
    label { display: block; margin-bottom: 5px; font-weight: 500; }
    input { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #1d4ed8; }
    #status { margin-top: 10px; font-size: 12px; color: #666; word-break: break-all; }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <h2>Readme AI</h2>
  <div>
    <label>Repository URL:</label>
    <input type="text" id="repoUrl" placeholder="https://github.com/user/repo">
  </div>
  <div>
    <label>GitHub Token:</label>
    <input type="password" id="token" placeholder="ghp_...">
  </div>
  <button id="cloneBtn">Clone Repository</button>
  <button id="pushBtn" style="margin-top: 8px; background: #16a34a;">Push Changes</button>
  <p id="status"></p>
  <script type="module">
    const repoUrlInput = document.getElementById('repoUrl');
    const tokenInput = document.getElementById('token');
    const cloneBtn = document.getElementById('cloneBtn');
    const pushBtn = document.getElementById('pushBtn');
    const status = document.getElementById('status');

    cloneBtn.addEventListener('click', async () => {
      const repoUrl = repoUrlInput.value;
      const token = tokenInput.value;

      if (!repoUrl || !token) {
        status.textContent = 'Please enter repository URL and token';
        status.className = 'error';
        return;
      }

      cloneBtn.disabled = true;
      cloneBtn.textContent = 'Loading...';
      status.textContent = 'Cloning repository...';
      status.className = '';

      try {
        const response = await browser.runtime.sendMessage({
          type: 'CLONE_REPO',
          payload: { repoUrl, token }
        });
        
        if (response.success) {
          status.textContent = 'Cloned to: ' + response.path;
          status.className = 'success';
        } else {
          status.textContent = 'Error: ' + response.error;
          status.className = 'error';
        }
      } catch (error) {
        status.textContent = 'Error: ' + error;
        status.className = 'error';
      }
      
      cloneBtn.disabled = false;
      cloneBtn.textContent = 'Clone Repository';
    });

    pushBtn.addEventListener('click', async () => {
      const repoUrl = repoUrlInput.value;
      const token = tokenInput.value;

      if (!repoUrl || !token) {
        status.textContent = 'Please enter repository URL and token';
        status.className = 'error';
        return;
      }

      const message = prompt('Commit message:');
      if (!message) return;

      pushBtn.disabled = true;
      pushBtn.textContent = 'Pushing...';
      status.textContent = 'Pushing changes...';
      status.className = '';

      try {
        const listResponse = await browser.runtime.sendMessage({
          type: 'LIST_FILES',
          payload: { repoUrl }
        });

        if (!listResponse.success) {
          status.textContent = 'Error: ' + listResponse.error;
          status.className = 'error';
          pushBtn.disabled = false;
          pushBtn.textContent = 'Push Changes';
          return;
        }

        const response = await browser.runtime.sendMessage({
          type: 'PUSH_CHANGES',
          payload: { 
            repoUrl, 
            token, 
            message,
            files: listResponse.files || []
          }
        });
        
        if (response.success) {
          status.textContent = 'Changes pushed successfully!';
          status.className = 'success';
        } else {
          status.textContent = 'Error: ' + response.error;
          status.className = 'error';
        }
      } catch (error) {
        status.textContent = 'Error: ' + error;
        status.className = 'error';
      }
      
      pushBtn.disabled = false;
      pushBtn.textContent = 'Push Changes';
    });
  </script>
</body>
</html>
