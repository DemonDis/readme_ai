<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Options - Readme AI</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 500px; margin: 0; }
    h1 { margin-top: 0; }
    label { display: block; margin-bottom: 5px; font-weight: 500; }
    input { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
    button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    p { font-size: 12px; color: #666; margin-bottom: 20px; }
    #message { margin-top: 10px; font-size: 14px; }
    .success { color: #16a34a; }
  </style>
</head>
<body>
  <h1>Readme AI - Settings</h1>
  <div>
    <label>GitHub Personal Access Token:</label>
    <input type="password" id="token" placeholder="ghp_...">
    <p>Token needs repo scope for private repositories</p>
  </div>
  <button id="saveBtn">Save Token</button>
  <p id="message"></p>

  <script type="module">
    const tokenInput = document.getElementById('token');
    const saveBtn = document.getElementById('saveBtn');
    const message = document.getElementById('message');

    browser.storage.local.get('githubToken').then(result => {
      if (result.githubToken) {
        tokenInput.value = result.githubToken;
      }
    });

    saveBtn.addEventListener('click', async () => {
      await browser.storage.local.set({ githubToken: tokenInput.value });
      message.textContent = 'Saved!';
      message.className = 'success';
      setTimeout(() => {
        message.textContent = '';
        message.className = '';
      }, 2000);
    });
  </script>
</body>
</html>
